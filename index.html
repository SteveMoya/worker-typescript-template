<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E2E Test - Cloudflare Pages</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fafafa; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 48px; max-width: 600px; width: 90%; text-align: center; }
    .badge { display: inline-block; background: #f97316; color: #000; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 999px; margin-bottom: 24px; }
    h1 { font-size: 32px; margin-bottom: 8px; }
    p { color: #888; font-size: 16px; line-height: 1.6; margin-bottom: 24px; }
    .status { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .status-item { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 20px; }
    .status-item .label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
    .status-item .value { font-size: 18px; font-weight: 600; margin-top: 4px; }
    .dot { display: inline-block; width: 8px; height: 8px; background: #22c55e; border-radius: 50%; margin-right: 6px; }
    .links { margin-top: 32px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .links a { color: #f97316; text-decoration: none; font-size: 14px; border: 1px solid #f97316; border-radius: 8px; padding: 10px 20px; transition: all 0.2s; }
    .links a:hover { background: #f97316; color: #000; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">CLOUDFLARE PAGES</div>
    <h1>🚀 E2E Test Deploy</h1>
    <p>This site is deployed via Cloudflare Pages from GitHub.<br>Stack: HTML + CSS — zero build step required.</p>
    <div class="status">
      <div class="status-item">
        <div class="label">Platform</div>
        <div class="value"><span class="dot"></span>Cloudflare Pages</div>
      </div>
      <div class="status-item">
        <div class="label">Branch</div>
        <div class="value">master</div>
      </div>
      <div class="status-item">
        <div class="label">Status</div>
        <div class="value"><span class="dot"></span>Live</div>
      </div>
    </div>
    <div class="links">
      <a href="https://github.com/SteveMoya/worker-typescript-template">GitHub Repo</a>
      <a href="/api/status">API Status</a>
    </div>
  </div>
</body>
</html>
